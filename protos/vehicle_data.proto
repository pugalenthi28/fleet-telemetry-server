// Official Tesla Fleet Telemetry protobuf schema
// Source: https://github.com/teslamotors/fleet-telemetry/blob/main/protos/vehicle_data.proto

syntax = "proto3";

package telemetry.vehicle_data;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/teslamotors/fleet-telemetry/protos";

