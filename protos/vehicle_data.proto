enum ShiftState {
  ShiftStateUnknown = 0;
  ShiftStateInvalid = 1;
  ShiftStateP = 2;
  ShiftStateR = 3;
  ShiftStateN = 4;
  ShiftStateD = 5;
  ShiftStateSNA = 6;
}

enum SentryModeState {
  SentryModeStateUnknown = 0;
  SentryModeStateOff = 1;
  SentryModeStateIdle = 2;
  SentryModeStateArmed = 3;
  SentryModeStateAware = 4;
  SentryModeStatePanic = 5;
  SentryModeStateQuiet = 6;
}

enum BMSStateValue {
  BMSStateUnknown = 0;
  BMSStateStandby = 1;
  BMSStateDrive = 2;
  BMSStateSupport = 3;
  BMSStateCharge = 4;
  BMSStateFEIM = 5;
  BMSStateClearFault = 6;
  BMSStateFault = 7;
  BMSStateWeld = 8;
  BMSStateTest = 9;
  BMSStateSNA = 10;
}

enum CarTypeValue {
  CarTypeUnknown = 0;
  CarTypeModelS = 1;
  CarTypeModelX = 2;
  CarTypeModel3 = 3;
  CarTypeModelY = 4;
  CarTypeSemiTruck = 5;
  CarTypeCybertruck = 6;
}

enum DetailedChargeStateValue {
  DetailedChargeStateUnknown = 0;
  DetailedChargeStateDisconnected = 1;
  DetailedChargeStateNoPower = 2;
  DetailedChargeStateStarting = 3;
  DetailedChargeStateCharging = 4;
  DetailedChargeStateComplete = 5;
  DetailedChargeStateStopped = 6;
}

enum FastCharger {
  FastChargerUnknown = 0;
  FastChargerSupercharger = 1;
  FastChargerCHAdeMO = 2;
  FastChargerGB = 3;
  FastChargerACSingleWireCAN = 4;
  FastChargerCombo = 5;
  FastChargerMCSingleWireCAN = 6;
  FastChargerOther = 7;
  FastChargerSNA = 8;
}

enum CableType {
  CableTypeUnknown = 0;
  CableTypeIEC = 1;
  CableTypeSAE = 2;
  CableTypeGB_AC = 3;
  CableTypeGB_DC = 4;
  CableTypeSNA = 5;
}

message LocationValue {
  double latitude = 1;
  double longitude = 2;
}

message Doors {
  bool DriverFront = 1;
  bool DriverRear = 2;
  bool PassengerFront = 3;
  bool PassengerRear = 4;
  bool TrunkFront = 5;
  bool TrunkRear = 6;
}

message Time {
  int32 hour = 1;
  int32 minute = 2;
  int32 second = 3;
}

message Value {
  oneof value {
    string string_value = 1;
    int32 int_value = 2;
    int64 long_value = 3;
    float float_value = 4;
    double double_value = 5;
    bool boolean_value = 6;
    LocationValue location_value = 7;
    ShiftState shift_state_value = 9;
    bool invalid = 10;
    SentryModeState sentry_mode_state_value = 13;
    BMSStateValue bms_state_value = 15;
    CarTypeValue car_type_value = 17;
    Doors door_value = 21;
    Time time_value = 31;
    DetailedChargeStateValue detailed_charge_state_value = 32;
    FastCharger fast_charger_value = 40;
    CableType cable_type_value = 41;
  }
}

message Datum {
  Field key = 1;
  Value value = 2;
}

// NOTE: field numbers changed from our original — vin is now field 3, data is field 1
message Payload {
  repeated Datum data = 1;
  google.protobuf.Timestamp created_at = 2;
  string vin = 3;
  bool is_resend = 4;
}
